sentinel: "1.0"
project: example-app
version: "1.0.0"
location: ./sentinel

platforms:
  apple:
    path: ./apple
    language: swift
    output:
      tokens: ./apple/ExampleApp/DesignSystem/Tokens/ExampleAppTokens.swift
      strings: ./apple/ExampleApp/Resources/Strings.swift
      flags: ./apple/ExampleApp/Core/FeatureFlags.swift

  google:
    path: ./google
    language: kotlin
    output:
      tokens: ./google/app/src/main/kotlin/com/example/app/design/ExampleAppTokens.kt
      strings: ./google/app/src/main/res/values/strings.xml
      flags: ./google/app/src/main/kotlin/com/example/app/core/FeatureFlags.kt

  web-admin:
    path: ./web-admin
    language: typescript
    framework: nextjs
    output:
      tokens: ./web-admin/styles/tokens.css
      strings: ./web-admin/locales/strings.ts
      flags: ./web-admin/config/featureFlags.ts

  web-public:
    path: ./web-public
    language: typescript
    framework: astro
    output:
      tokens: ./web-public/src/styles/tokens.css
      strings: ./web-public/src/config/strings.ts
      flags: ./web-public/src/config/featureFlags.ts

catalog:
  output: catalog/
  resize: 1000
  ios18:
    iphone:
      slug: example-app-ios
      app_id: com.example.app
  ios26:
    iphone:
      slug: example-app-ios26
      app_id: com.example.app
      glossy: true
  android:
    phone:
      slug: example-app-android
      app_ids:
        dev: app.example-app.dev
        stage: app.example-app.stage
        prod: app.example-app
  screens:
    - slug: welcome
      name: Welcome
      flow: |
        - launchApp:
            appId: com.example.app
            arguments: ["--screen=welcome"]
    - slug: journey
      name: Journey
      flow: |
        - launchApp:
            appId: com.example.app
            arguments: ["--tab=journey"]
    - slug: analytics
      name: Analytics
      flow: |
        - launchApp:
            appId: com.example.app
            arguments: ["--tab=journey", "--screen=analytics"]
