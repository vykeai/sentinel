sentinel: "1.0"
project: fitkind
version: "1.0.0"
location: ./sentinel

platforms:
  apple:
    path: ./apple
    language: swift
    output:
      tokens: ./apple/FitKind/DesignSystem/Tokens/FitKindTokens.swift
      strings: ./apple/FitKind/Resources/Strings.swift
      flags: ./apple/FitKind/Core/FeatureFlags.swift

  google:
    path: ./google
    language: kotlin
    output:
      tokens: ./google/app/src/main/kotlin/com/fitkind/design/FitKindTokens.kt
      strings: ./google/app/src/main/res/values/strings.xml
      flags: ./google/app/src/main/kotlin/com/fitkind/core/FeatureFlags.kt

  web-admin:
    path: ./web-admin
    language: typescript
    framework: nextjs
    output:
      tokens: ./web-admin/styles/tokens.css
      strings: ./web-admin/locales/strings.ts
      flags: ./web-admin/config/featureFlags.ts

  web-public:
    path: ./web-public
    language: typescript
    framework: astro
    output:
      tokens: ./web-public/src/styles/tokens.css
      strings: ./web-public/src/config/strings.ts
      flags: ./web-public/src/config/featureFlags.ts

catalog:
  output: catalog/
  resize: 1000
  ios18:
    iphone:
      slug: fitkind-ios
      app_id: com.fitkind.app
  ios26:
    iphone:
      slug: fitkind-ios26
      app_id: com.fitkind.app
      glossy: true
  android:
    phone:
      slug: fitkind-android
      app_ids:
        dev: app.fitkind.dev
        stage: app.fitkind.stage
        prod: app.fitkind
  screens:
    - slug: welcome
      name: Welcome
      flow: |
        - launchApp:
            appId: com.fitkind.app
            arguments: ["--screen=welcome"]
    - slug: journey
      name: Journey
      flow: |
        - launchApp:
            appId: com.fitkind.app
            arguments: ["--tab=journey"]
    - slug: analytics
      name: Analytics
      flow: |
        - launchApp:
            appId: com.fitkind.app
            arguments: ["--tab=journey", "--screen=analytics"]
